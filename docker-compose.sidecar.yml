# Docker Compose for testing sidecar functionality locally
# Usage: docker compose -f docker-compose.sidecar.yml up

services:
  # OpenIdDict Sidecar - provides OAuth2 token server and authorization
  openiddict-sidecar:
    build:
      context: .
      dockerfile: sidecars/Ignixa.Sidecar.OpenIdDict/Dockerfile
    container_name: ignixa-sidecar-openiddict
    ports:
      - "5050:5050"   # gRPC for authorization
      - "8081:8080"   # HTTP for token endpoint
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - OpenIdDictAuthorization__AllowAuthenticatedByDefault=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - ignixa-sidecar

  # Ignixa FHIR Server - configured to use the sidecar
  fhir-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ignixa-fhir-server
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Sidecar__ProviderMode=Sidecar
      - Sidecar__Endpoint=http://openiddict-sidecar:5050
      - Sidecar__TimeoutMs=5000
      - Sidecar__FailOpen=false
    depends_on:
      openiddict-sidecar:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - ignixa-sidecar

networks:
  ignixa-sidecar:
    driver: bridge

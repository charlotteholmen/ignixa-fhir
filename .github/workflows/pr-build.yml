name: PR Build

on:
  pull_request:
    branches: [ main, fhir-v2 ]
    paths:
      - 'src/**'
      - 'test/**'
      - 'bench/**'
      - 'tools/**'
      - 'docs/site/**'
      - 'All.sln'
      - 'Directory.Packages.props'
      - 'Directory.Build.props'
      - 'Directory.Build.targets'
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/pr-build.yml'
      - '.github/actions/dotnet-build-and-test/**'

concurrency:
  group: pr-build-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  SQL_SA_PASSWORD: ${{ secrets.SQL_SA_PASSWORD || 'YourStrong!Passw0rd' }}

jobs:
  build-and-unit-tests:
    name: Build and Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet-version: [ '9.0.x' ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for GitVersion
          submodules: recursive

      - name: Build and run unit tests (exclude E2E)
        id: build
        uses: ./.github/actions/dotnet-build-and-test
        with:
          dotnet-version: ${{ matrix.dotnet-version }}
          solution-file: 'All.sln'
          build-configuration: 'Release'
          test-filter: 'FullyQualifiedName!~E2ETests'

  e2e-tests-sql:
    name: E2E Tests (SQL Server)
    runs-on: ubuntu-latest
    # Run in parallel with unit tests for faster CI (both do their own build)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Start SQL Server container
        run: |
          echo "Starting SQL Server and Azurite containers..."
          docker compose -f docker-compose.test.yml up -d --wait || {
            echo "❌ Container startup failed. Checking logs..."
            docker compose -f docker-compose.test.yml logs
            docker ps -a
            exit 1
          }
          echo "✅ SQL Server and Azurite started and healthy"
        env:
          SQL_SA_PASSWORD: ${{ env.SQL_SA_PASSWORD }}

      - name: Verify SQL Server connection
        run: |
          docker exec ignixa-test-sql /opt/mssql-tools18/bin/sqlcmd \
            -S localhost -C -U sa -P "${{ env.SQL_SA_PASSWORD }}" \
            -Q "SELECT @@VERSION" -b
        timeout-minutes: 2

      - name: Restore E2E test project
        run: dotnet restore test/Ignixa.Api.E2ETests/Ignixa.Api.E2ETests.csproj

      - name: Build E2E test project
        run: dotnet build test/Ignixa.Api.E2ETests/Ignixa.Api.E2ETests.csproj --configuration Release --no-restore

      - name: Run E2E tests
        run: |
          dotnet test test/Ignixa.Api.E2ETests/Ignixa.Api.E2ETests.csproj \
            --configuration Release \
            --no-build \
            --logger "trx;LogFileName=e2e-test-results.trx" \
            --verbosity normal
        env:
          TEST_SQL_CONNECTION_STRING: "Server=localhost,1433;Database=FhirTest;User Id=sa;Password=${{ env.SQL_SA_PASSWORD }};TrustServerCertificate=true;Encrypt=false"

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: '**/e2e-test-results.trx'
          retention-days: 30

      - name: Publish E2E test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: '**/e2e-test-results.trx'
          check_name: 'E2E Test Results'
          comment_mode: 'off'

      - name: Capture SQL Server logs on failure
        if: failure()
        run: |
          echo "=== SQL Server Logs ==="
          docker logs ignixa-test-sql
          echo "=== SQL Server Error Logs ==="
          docker exec ignixa-test-sql cat /var/opt/mssql/log/errorlog || true

      - name: Cleanup SQL Server container
        if: always()
        run: |
          docker compose -f docker-compose.test.yml down -v
          echo "✅ SQL Server container stopped and removed"

  validate-docker:
    name: Validate Docker Build
    runs-on: ubuntu-latest
    # Run in parallel with unit tests for faster CI (Docker does its own build)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for GitVersion
          submodules: recursive

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: '6.x'

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v3
        with:
          useConfigFile: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ignixa-fhir:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true
          build-args: |
            VERSION=${{ steps.gitversion.outputs.semVer }}
            ASSEMBLY_VERSION=${{ steps.gitversion.outputs.assemblySemVer }}
            INFORMATIONAL_VERSION=${{ steps.gitversion.outputs.informationalVersion }}

      - name: Test Docker image
        run: |
          echo "Testing Docker image..."
          docker images ignixa-fhir:pr-${{ github.event.pull_request.number }}
          docker inspect ignixa-fhir:pr-${{ github.event.pull_request.number }}

  validate-docs:
    name: Validate Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: docs/site/package-lock.json

      - name: Install dependencies
        working-directory: docs/site
        run: npm ci

      - name: Build documentation (validates links)
        working-directory: docs/site
        run: npm run build

  pr-success:
    name: PR Validation Complete
    runs-on: ubuntu-latest
    needs: [ build-and-unit-tests, e2e-tests-sql, validate-docker, validate-docs ]
    if: always() && !contains(needs.*.result, 'failure')

    steps:
      - name: Get version from build job
        id: get_version
        run: echo "This PR validation completed successfully"

      - name: Comment PR on success
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **PR Validation Successful**\n\n- Unit tests passed\n- E2E tests passed (SQL Server)\n- Docker image builds successfully\n- Build uses GitVersion for semantic versioning'
            })

  pr-failure:
    name: PR Validation Failed
    runs-on: ubuntu-latest
    needs: [ build-and-unit-tests, e2e-tests-sql, validate-docker, validate-docs ]
    if: failure()

    steps:
      - name: Comment PR on failure
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **PR Validation Failed** - Check the workflow logs for details'
            })

name: PR Build

on:
  pull_request:
    branches: [ main, fhir-v2 ]
    paths:
      - 'src/**'
      - 'test/**'
      - 'bench/**'
      - 'All.sln'
      - 'Dockerfile'
      - '.dockerignore'
      - '.github/workflows/pr-build.yml'
      - '.github/actions/dotnet-build-and-test/**'

concurrency:
  group: pr-build-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet-version: [ '9.0.x' ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build and test solution
        uses: ./.github/actions/dotnet-build-and-test
        with:
          dotnet-version: ${{ matrix.dotnet-version }}
          solution-file: 'All.sln'
          build-configuration: 'Release'

  validate-docker:
    name: Validate Docker Build
    runs-on: ubuntu-latest
    needs: [ build-and-test ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ignixa-fhir:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Test Docker image
        run: |
          echo "Testing Docker image..."
          docker images ignixa-fhir:pr-${{ github.event.pull_request.number }}
          docker inspect ignixa-fhir:pr-${{ github.event.pull_request.number }}

  pr-success:
    name: PR Validation Complete
    runs-on: ubuntu-latest
    needs: [ build-and-test, validate-docker ]
    if: success()

    steps:
      - name: Comment PR on success
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **PR Validation Successful**\n\n- All tests passed\n- Docker image builds successfully'
            })

  pr-failure:
    name: PR Validation Failed
    runs-on: ubuntu-latest
    needs: [ build-and-test, validate-docker ]
    if: failure()

    steps:
      - name: Comment PR on failure
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **PR Validation Failed** - Check the workflow logs for details'
            })

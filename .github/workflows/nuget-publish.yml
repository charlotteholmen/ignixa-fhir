name: NuGet Publish

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches: [ main ]
  workflow_dispatch:  # Allow manual trigger

concurrency:
  group: nuget-publish-${{ github.ref }}
  cancel-in-progress: false  # Don't cancel in-progress publishes

jobs:
  check-ci-success:
    name: Check CI Success
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_run'
    steps:
      - name: Check CI workflow result
        run: |
          if [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
            echo "❌ CI workflow did not succeed. Conclusion: ${{ github.event.workflow_run.conclusion }}"
            echo "NuGet packages will NOT be published when CI fails."
            exit 1
          fi
          echo "✅ CI workflow succeeded. Proceeding with NuGet publish."

  check-nuget-changes:
    name: Check for NuGet-related changes
    runs-on: ubuntu-latest
    needs: [ check-ci-success ]
    if: always() && (needs.check-ci-success.result == 'success' || needs.check-ci-success.result == 'skipped')
    outputs:
      should-publish: ${{ steps.filter.outputs.nuget }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need at least 2 commits to compare

      - name: Check paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            nuget:
              - 'src/Core/Ignixa.Abstractions/**'
              - 'src/Core/Ignixa.FhirFakes/**'
              - 'src/Core/Ignixa.FhirPath/**'
              - 'src/Core/Ignixa.FhirMappingLanguage/**'
              - 'src/Core/Ignixa.PackageManagement/**'
              - 'src/Core/Ignixa.Search/**'
              - 'src/Core/Ignixa.Serialization/**'
              - 'src/Core/Ignixa.Specification/**'
              - 'src/Core/Ignixa.SqlOnFhir/**'
              - 'src/Core/Ignixa.Validation/**'
              - 'src/Core/Extensions/Ignixa.Extensions.FirelySdk5/**'
              - 'src/Core/Extensions/Ignixa.Extensions.FirelySdk6/**'
              - 'Directory.Build.props'
              - 'Directory.Packages.props'
              - 'GitVersion.yml'

  build-and-pack:
    name: Build and Pack NuGet Packages
    runs-on: ubuntu-latest
    needs: [ check-ci-success, check-nuget-changes ]
    if: |
      always() &&
      (needs.check-ci-success.result == 'success' || needs.check-ci-success.result == 'skipped') &&
      (needs.check-nuget-changes.outputs.should-publish == 'true' || github.event_name == 'workflow_dispatch')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for GitVersion
          submodules: recursive

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: '6.x'

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v3
        with:
          useConfigFile: true

      - name: Display version
        run: |
          echo "NuGetVersion: ${{ steps.gitversion.outputs.nuGetVersion }}"
          echo "SemVer: ${{ steps.gitversion.outputs.semVer }}"
          echo "AssemblySemVer: ${{ steps.gitversion.outputs.assemblySemVer }}"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore All.sln

      - name: Build solution
        run: dotnet build All.sln --configuration Release --no-restore /p:Version=${{ steps.gitversion.outputs.nuGetVersion }}

      - name: Run all tests
        run: |
          # Run unit tests only - E2E tests already validated by CI workflow
          # Test results already published by CI - this is just a safety check
          dotnet test All.sln \
            --configuration Release \
            --no-build \
            --filter "FullyQualifiedName!~E2ETests" \
            --verbosity normal

      - name: Pack Core projects
        run: |
          dotnet pack src/Core/Ignixa.Abstractions/Ignixa.Abstractions.csproj --configuration Release --no-build --output ./packages -p:PackageVersion=${{ steps.gitversion.outputs.nuGetVersion }}
          dotnet pack src/Core/Ignixa.FhirFakes/Ignixa.FhirFakes.csproj --configuration Release --no-build --output ./packages -p:PackageVersion=${{ steps.gitversion.outputs.nuGetVersion }}
          dotnet pack src/Core/Ignixa.FhirPath/Ignixa.FhirPath.csproj --configuration Release --no-build --output ./packages -p:PackageVersion=${{ steps.gitversion.outputs.nuGetVersion }}
          dotnet pack src/Core/Ignixa.FhirMappingLanguage/Ignixa.FhirMappingLanguage.csproj --configuration Release --no-build --output ./packages -p:PackageVersion=${{ steps.gitversion.outputs.nuGetVersion }}
          dotnet pack src/Core/Ignixa.PackageManagement/Ignixa.PackageManagement.csproj --configuration Release --no-build --output ./packages -p:PackageVersion=${{ steps.gitversion.outputs.nuGetVersion }}
          dotnet pack src/Core/Ignixa.Search/Ignixa.Search.csproj --configuration Release --no-build --output ./packages -p:PackageVersion=${{ steps.gitversion.outputs.nuGetVersion }}
          dotnet pack src/Core/Ignixa.Serialization/Ignixa.Serialization.csproj --configuration Release --no-build --output ./packages -p:PackageVersion=${{ steps.gitversion.outputs.nuGetVersion }}
          dotnet pack src/Core/Ignixa.Specification/Ignixa.Specification.csproj --configuration Release --no-build --output ./packages -p:PackageVersion=${{ steps.gitversion.outputs.nuGetVersion }}
          dotnet pack src/Core/Ignixa.SqlOnFhir/Ignixa.SqlOnFhir.csproj --configuration Release --no-build --output ./packages -p:PackageVersion=${{ steps.gitversion.outputs.nuGetVersion }}
          dotnet pack src/Core/Ignixa.Validation/Ignixa.Validation.csproj --configuration Release --no-build --output ./packages -p:PackageVersion=${{ steps.gitversion.outputs.nuGetVersion }}
          dotnet pack src/Core/Extensions/Ignixa.Extensions.FirelySdk5/Ignixa.Extensions.FirelySdk5.csproj --configuration Release --no-build --output ./packages -p:PackageVersion=${{ steps.gitversion.outputs.nuGetVersion }}
          dotnet pack src/Core/Extensions/Ignixa.Extensions.FirelySdk6/Ignixa.Extensions.FirelySdk6.csproj --configuration Release --no-build --output ./packages -p:PackageVersion=${{ steps.gitversion.outputs.nuGetVersion }}

      - name: List packages
        run: ls -lh ./packages/

      - name: Upload packages as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ./packages/*.nupkg
          retention-days: 30

  publish-to-nuget:
    name: Publish to NuGet.org
    runs-on: ubuntu-latest
    needs: [ build-and-pack ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: ./packages

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish to NuGet.org
        run: |
          dotnet nuget push "./packages/*.nupkg" \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

      - name: Create release summary
        run: |
          echo "## 📦 NuGet Packages Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The following packages have been published to NuGet.org:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for pkg in ./packages/*.nupkg; do
            basename "$pkg" >> $GITHUB_STEP_SUMMARY
          done

  notify-success:
    name: Notify Success
    runs-on: ubuntu-latest
    needs: [ publish-to-nuget ]
    if: success()

    steps:
      - name: Success notification
        run: echo "✅ NuGet packages published successfully"

  notify-failure:
    name: Notify Failure
    runs-on: ubuntu-latest
    needs: [ build-and-pack, publish-to-nuget ]
    if: failure()

    steps:
      - name: Failure notification
        run: |
          echo "❌ NuGet publishing failed"
          exit 1

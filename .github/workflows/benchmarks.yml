name: Benchmarks

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      benchmark_filter:
        description: 'Benchmark filter (e.g., *FhirPath* or leave empty for all)'
        required: false
        default: '*'
      skip_commit:
        description: 'Skip committing results (just upload artifacts)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write  # For committing benchmark results

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history for comparison

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore bench/Ignixa.Benchmarks/Ignixa.Benchmarks.csproj

      - name: Run Benchmarks
        run: |
          cd bench/Ignixa.Benchmarks
          dotnet run -c Release -- \
            --filter '${{ github.event.inputs.benchmark_filter || '*' }}' \
            --exporters json \
            --memory

      - name: Prepare benchmark data for docs site
        run: |
          # Get branch name and sanitize for directory name
          BRANCH_NAME="${{ github.ref_name }}"
          BRANCH_SAFE=$(echo "$BRANCH_NAME" | sed 's/\//-/g')

          # Get short commit hash
          SHORT_HASH=$(echo "${{ github.sha }}" | cut -c1-7)

          # Create directory structure: [branch]-[hash]
          RUN_DIR="${BRANCH_SAFE}-${SHORT_HASH}"
          BENCHMARK_DIR="docs/site/static/benchmarks/${RUN_DIR}"
          mkdir -p "$BENCHMARK_DIR"

          # Copy JSON results to versioned directory
          cp bench/Ignixa.Benchmarks/BenchmarkDotNet.Artifacts/results/*.json \
             "$BENCHMARK_DIR/" || true

          # Create metadata file in run directory
          cat > "${BENCHMARK_DIR}/metadata.json" <<EOF
          {
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "commit": "${{ github.sha }}",
            "branch": "${{ github.ref_name }}",
            "run_number": "${{ github.run_number }}",
            "workflow": "${{ github.workflow }}"
          }
          EOF

          # Update latest.json to reference this run
          LATEST_FILE="docs/site/static/benchmarks/latest.json"
          if [ -f "$LATEST_FILE" ]; then
            # Add new run to existing latest.json
            TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            python3 << PYTHON_EOF
          import json
          import sys

          # Read existing latest.json
          with open('docs/site/static/benchmarks/latest.json', 'r') as f:
              data = json.load(f)

          # Add new run
          new_run = {
              "directory": "${RUN_DIR}",
              "branch": "${{ github.ref_name }}",
              "commit": "${{ github.sha }}",
              "timestamp": "${TIMESTAMP}",
              "run_number": "${{ github.run_number }}"
          }

          # Update latest and prepend to runs list
          data['latestRun'] = "${RUN_DIR}"
          data['runs'].insert(0, new_run)

          # Write back
          with open('docs/site/static/benchmarks/latest.json', 'w') as f:
              json.dump(data, f, indent=2)
          PYTHON_EOF
          else
            # Create new latest.json
            cat > "$LATEST_FILE" <<LATEST_EOF
          {
            "latestRun": "${RUN_DIR}",
            "runs": [
              {
                "directory": "${RUN_DIR}",
                "branch": "${{ github.ref_name }}",
                "commit": "${{ github.sha }}",
                "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
                "run_number": "${{ github.run_number }}"
              }
            ]
          }
          LATEST_EOF
          fi

      - name: Create PR with benchmark results
        if: github.event.inputs.skip_commit != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Get base branch name
          BASE_BRANCH="${{ github.ref_name }}"

          # Create unique branch name for benchmark results
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          RESULTS_BRANCH="benchmarks/${BASE_BRANCH}-${TIMESTAMP}"

          # Create and switch to new branch
          git checkout -b "$RESULTS_BRANCH"

          # Stage benchmark results
          git add docs/site/static/benchmarks/

          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No benchmark changes to commit"
            exit 0
          fi

          # Commit changes
          git commit -m "📊 Benchmark results from run #${{ github.run_number }}

          Branch: ${{ github.ref_name }}
          Commit: ${{ github.sha }}
          Run: ${{ github.run_number }}

          Benchmark data saved to: docs/site/static/benchmarks/

          Auto-generated by GitHub Actions workflow"

          # Push the new branch
          git push origin "$RESULTS_BRANCH"

          # Create PR using gh CLI
          gh pr create \
            --base "$BASE_BRANCH" \
            --head "$RESULTS_BRANCH" \
            --title "📊 Benchmark Results - Run #${{ github.run_number }}" \
            --body "## Benchmark Results

          **Base Branch:** \`${{ github.ref_name }}\`
          **Commit:** \`${{ github.sha }}\`
          **Run Number:** #${{ github.run_number }}
          **Timestamp:** $(date -u +%Y-%m-%dT%H:%M:%SZ)

          ### What's included

          - Updated benchmark results in \`docs/site/static/benchmarks/\`
          - Metadata and JSON files for the docs site dashboard

          ### Preview

          View the benchmark dashboard after merging:
          - [Performance Dashboard](https://brendankowitz.github.io/ignixa-fhir/benchmarks-dashboard)

          ### Auto-merge

          This PR can be safely merged if the benchmark results look reasonable.

          ---
          🤖 Auto-generated by [Benchmarks workflow](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" \
            --label "benchmarks,automated" || echo "PR creation skipped (may already exist)"

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.run_number }}
          path: |
            bench/Ignixa.Benchmarks/BenchmarkDotNet.Artifacts/results/*.html
            bench/Ignixa.Benchmarks/BenchmarkDotNet.Artifacts/results/*.md
            bench/Ignixa.Benchmarks/BenchmarkDotNet.Artifacts/results/*.csv
            bench/Ignixa.Benchmarks/BenchmarkDotNet.Artifacts/results/*.json
          retention-days: 90

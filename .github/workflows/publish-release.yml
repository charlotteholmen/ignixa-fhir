name: 🚀 Publish Release

on:
  workflow_dispatch:
    inputs:
      skip_docker:
        description: 'Skip Docker publish'
        type: boolean
        default: false
      skip_nuget:
        description: 'Skip NuGet publish'
        type: boolean
        default: false
      skip_tag:
        description: 'Skip Git tag creation'
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  # =============================================================================
  # Stage 1: Prepare Release (download artifacts, extract version)
  # =============================================================================
  prepare-release:
    name: 📦 Prepare Release
    runs-on: ubuntu-latest
    outputs:
      release_version: ${{ steps.version.outputs.release_version }}
      commit_sha: ${{ steps.version.outputs.commit_sha }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Core NuGet Artifacts
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: ci.yml
          name: nuget-packages-core
          path: ./core-packages
          workflow_conclusion: success
          branch: main

      - name: Download Internal NuGet Artifacts
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: ci.yml
          name: nuget-packages-internal
          path: ./internal-packages
          workflow_conclusion: success
          branch: main

      - name: Read Release Version and Commit SHA
        id: version
        run: |
          RELEASE_VERSION=$(cat ./core-packages/version.txt)
          COMMIT_SHA=$(cat ./core-packages/commit-sha.txt)

          if [ -z "$RELEASE_VERSION" ]; then
            echo "❌ Error: Failed to read release version from artifact"
            exit 1
          fi
          if [ -z "$COMMIT_SHA" ]; then
            echo "❌ Error: Failed to read commit SHA from artifact"
            exit 1
          fi

          echo "release_version=$RELEASE_VERSION" >> $GITHUB_OUTPUT
          echo "commit_sha=$COMMIT_SHA" >> $GITHUB_OUTPUT
          echo "Release Version: $RELEASE_VERSION"
          echo "Commit SHA: $COMMIT_SHA"

      - name: Upload Core packages for later jobs
        uses: actions/upload-artifact@v4
        with:
          name: release-packages-core
          path: ./core-packages/*.nupkg
          retention-days: 1

      - name: Upload Internal packages for later jobs
        uses: actions/upload-artifact@v4
        with:
          name: release-packages-internal
          path: ./internal-packages/*.nupkg
          retention-days: 1

  # =============================================================================
  # Stage 2a: Publish Docker Image
  # =============================================================================
  publish-docker:
    name: 🐳 Publish Docker
    runs-on: ubuntu-latest
    needs: prepare-release
    if: ${{ !inputs.skip_docker }}

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote Docker Image to Release
        env:
          IMAGE_REGISTRY: ghcr.io
          IMAGE_NAMESPACE: ${{ github.repository }}
          RELEASE_VERSION: ${{ needs.prepare-release.outputs.release_version }}
          COMMIT_SHA: ${{ needs.prepare-release.outputs.commit_sha }}
        run: |
          SHORT_SHA=$(echo "$COMMIT_SHA" | cut -c1-7)
          SOURCE_TAG="main-${SHORT_SHA}"
          RELEASE_TAG="release"
          VERSION_TAG="$RELEASE_VERSION"

          IMAGE_URL="${IMAGE_REGISTRY}/${IMAGE_NAMESPACE}"

          echo "Promoting Docker image..."
          echo "Source: ${IMAGE_URL}:${SOURCE_TAG}"
          echo "To: ${IMAGE_URL}:${RELEASE_TAG}"
          echo "To: ${IMAGE_URL}:${VERSION_TAG}"

          # Pull the image (using lowercase for GHCR)
          docker pull "${IMAGE_URL,,}:${SOURCE_TAG}"

          # Retag with release and version
          docker tag "${IMAGE_URL,,}:${SOURCE_TAG}" "${IMAGE_URL,,}:${RELEASE_TAG}"
          docker tag "${IMAGE_URL,,}:${SOURCE_TAG}" "${IMAGE_URL,,}:${VERSION_TAG}"

          # Push the new tags
          docker push "${IMAGE_URL,,}:${RELEASE_TAG}"
          docker push "${IMAGE_URL,,}:${VERSION_TAG}"

          echo "✅ Docker image promoted successfully"

  # =============================================================================
  # Stage 2b: Publish Core NuGet Packages to NuGet.org (runs in parallel with Docker)
  # =============================================================================
  publish-nuget-core:
    name: 📦 Publish Core to NuGet.org
    runs-on: ubuntu-latest
    needs: prepare-release
    if: ${{ !inputs.skip_nuget }}

    steps:
      - name: Download Core NuGet packages
        uses: actions/download-artifact@v4
        with:
          name: release-packages-core
          path: ./core-packages

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish Core packages to NuGet.org
        run: |
          echo "Publishing Core packages to NuGet.org..."
          dotnet nuget push ./core-packages/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

  # =============================================================================
  # Stage 2c: Publish Internal NuGet Packages to GitHub Packages (runs in parallel)
  # =============================================================================
  publish-nuget-internal:
    name: 📦 Publish Internal to GitHub Packages
    runs-on: ubuntu-latest
    needs: prepare-release
    if: ${{ !inputs.skip_nuget }}

    steps:
      - name: Download Internal NuGet packages
        uses: actions/download-artifact@v4
        with:
          name: release-packages-internal
          path: ./internal-packages

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish Internal packages to GitHub Packages
        run: |
          echo "Publishing Internal packages to GitHub Packages..."
          dotnet nuget push ./internal-packages/*.nupkg \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --skip-duplicate
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # =============================================================================
  # Stage 3: Create Git Tag (after Docker + NuGet succeed or are skipped)
  # =============================================================================
  create-git-tag:
    name: 🏷️ Create Git Tag
    runs-on: ubuntu-latest
    needs: [prepare-release, publish-docker, publish-nuget-core, publish-nuget-internal]
    # Run if: not skipped AND (all publishing jobs succeeded OR were skipped)
    if: |
      !inputs.skip_tag &&
      (needs.publish-docker.result == 'success' || needs.publish-docker.result == 'skipped') &&
      (needs.publish-nuget-core.result == 'success' || needs.publish-nuget-core.result == 'skipped') &&
      (needs.publish-nuget-internal.result == 'success' || needs.publish-nuget-internal.result == 'skipped')

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Git Tag
        env:
          RELEASE_VERSION: ${{ needs.prepare-release.outputs.release_version }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          TAG_NAME="release/${RELEASE_VERSION}"

          # Check if tag already exists
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "⚠️ Tag $TAG_NAME already exists, skipping"
          else
            git tag "$TAG_NAME"
            git push origin "$TAG_NAME"
            echo "✅ Created and pushed tag: $TAG_NAME"
          fi

  # =============================================================================
  # Stage 4: Create GitHub Release with AI Release Notes
  # =============================================================================
  create-github-release:
    name: 📝 Create GitHub Release
    runs-on: ubuntu-latest
    needs: [prepare-release, create-git-tag]
    # Run if tag succeeded OR was skipped (for testing release notes generation)
    # always() is required to run when dependencies are skipped
    if: |
      always() &&
      needs.prepare-release.result == 'success' &&
      (needs.create-git-tag.result == 'success' || needs.create-git-tag.result == 'skipped')

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Core NuGet packages
        uses: actions/download-artifact@v4
        with:
          name: release-packages-core
          path: ./core-packages

      - name: Download Internal NuGet packages
        uses: actions/download-artifact@v4
        with:
          name: release-packages-internal
          path: ./internal-packages

      - name: Generate AI Release Notes
        id: ai_notes
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          RELEASE_VERSION: ${{ needs.prepare-release.outputs.release_version }}
          TAG_SKIPPED: ${{ needs.create-git-tag.result == 'skipped' }}
        run: |
          CURRENT_TAG="release/${RELEASE_VERSION}"

          # If tag was skipped (testing mode), use HEAD instead
          if [ "$TAG_SKIPPED" == "true" ]; then
            echo "⚠️ Tag skipped - using HEAD for release notes generation (TEST MODE)"
            CURRENT_REF="HEAD"
            # For test mode, find the most recent release tag
            PREV_TAG=$(git tag -l 'release/*' --sort=-version:refname | head -1)
          else
            CURRENT_REF="$CURRENT_TAG"
            # Find the immediately preceding release tag by version sort
            # This gets all release tags sorted newest-first, finds current tag, then takes the next one
            PREV_TAG=$(git tag -l 'release/*' --sort=-version:refname | grep -A1 "^${CURRENT_TAG}$" | tail -1)

            # Fallback: if current tag not found in list (shouldn't happen but be defensive)
            # get the most recent tag that's not the current one
            if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" == "$CURRENT_TAG" ]; then
              echo "⚠️ grep method failed, using fallback to find previous tag"
              PREV_TAG=$(git tag -l 'release/*' --sort=-version:refname | grep -v "^${CURRENT_TAG}$" | head -1)
            fi
          fi

          echo "Generating release notes for $CURRENT_REF (comparing to $PREV_TAG)..."

          # Get Commits
          if [ -z "$PREV_TAG" ]; then
            echo "⚠️ No previous release tag found - generating notes from all commits (this should only happen for first release)"
            COMMITS=$(git log "$CURRENT_REF" --pretty=format:"HASH:%h | AUTHOR:%an | SUBJECT:%s | BODY:%b")
          else
            echo "📝 Comparing $PREV_TAG..$CURRENT_REF"
            COMMITS=$(git log "$PREV_TAG..$CURRENT_REF" --pretty=format:"HASH:%h | AUTHOR:%an | SUBJECT:%s | BODY:%b")
          fi

          # Extract PR numbers from commit messages and fetch PR details
          echo "Fetching PR details..."
          PR_NUMBERS=$(echo "$COMMITS" | grep -oE '#[0-9]+' | tr -d '#' | sort -u)

          PR_DETAILS=""
          for pr in $PR_NUMBERS; do
            echo "  Fetching PR #$pr..."
            # Get PR info in a simple format
            PR_LINE=$(gh pr view "$pr" --json number,title,labels,author --jq '
              "PR #\(.number): [\(.labels | map(.name) | join(", "))] \(.title) by @\(.author.login)"
            ' 2>/dev/null || echo "")
            PR_BODY=$(gh pr view "$pr" --json body --jq '.body // "" | .[0:500]' 2>/dev/null || echo "")

            if [ -n "$PR_LINE" ]; then
              PR_DETAILS="${PR_DETAILS}
          ${PR_LINE}
          Description: ${PR_BODY}"
            fi
          done

          # Fetch recently closed issues that might be related
          echo "Fetching related issues..."
          if [ -n "$PREV_TAG" ]; then
            PREV_DATE=$(git log -1 --format=%ci "$PREV_TAG" 2>/dev/null || echo "2024-01-01")
            CLOSED_ISSUES=$(gh issue list --state closed --search "closed:>=$PREV_DATE" --limit 20 --json number,title,labels --jq '.[] | "Issue #\(.number): [\(.labels | map(.name) | join(", "))] \(.title)"' 2>/dev/null || echo "")
          else
            CLOSED_ISSUES=""
          fi

          # Define the System Prompt with richer context
          read -r -d '' SYSTEM_PROMPT << EOM || true
          You are a chaotic good Release Manager for an Open Source Project.

          SELF-REFERENCE RULES (CRITICAL):
          - You ARE the Release Manager. This is your identity.
          - Use first-person: "I", "we", "our team"
          - Refer to yourself as "Release Manager" when needed
          - NEVER use third-person like "the AI", "this tool", "the system", or "the bot"
          - NEVER say "Your [adjective] Release Manager" anywhere - not in intros, not in sign-offs
          - For sign-offs: Either skip formal sign-offs or use simple first-person like "- Release Manager" (no adjectives like "your chaotic good")
          - Examples:
            - CORRECT: "I'm excited to announce..." or "We've been working on..." or "I'm here with..."
            - CORRECT SIGN-OFF: "- Release Manager" or just end naturally with no sign-off
            - WRONG: "The AI has generated..." or "This tool created..." or "Your favorite chaotic good Release Manager is here"
            - WRONG SIGN-OFF: "Your chaotic good Release Manager" or "Your [anything] Release Manager"

          TASK:
          Create release notes from the provided information for version ${RELEASE_VERSION}.

          AVAILABLE DATA:
          1. Git commits (with hash, author, subject, body)
          2. Pull Request details (title, description, labels, author)
          3. Recently closed issues

          FORMATTING RULES:
          1. **Categorize**: Group changes into standard headers like '🚀 Features', '🐛 Bug Fixes', '🔧 Chore/Maintenance', '📦 Dependencies'.
          2. **Links**: Convert PR/Issue references to Markdown links: [#123]($REPO_URL/issues/123).
          3. **Style**: Be concise but descriptive. Use PR titles and descriptions for context.
          4. **Labels**: Use PR labels to help categorize (e.g., 'bug' → Bug Fixes, 'enhancement' → Features).

          HUMOR GUIDELINES (IMPORTANT):
          This is a .NET FHIR server project. Add technical humor where appropriate using these approved themes.

          **Core Rule: Punch "In" or "Up", NEVER "Out"**
          - Punch "In" (SAFE): Make fun of our own code, bugs, or team habits
            Example: "We finally fixed that bug we created 3 commits ago"
          - Punch "Up" (SAFE): Make fun of technical complexity (FHIR spec, memory management, etc.)
            Example: "FHIR specification has 5,000 pages and we read all of them (twice)"
          - NEVER Punch "Out": NEVER joke about healthcare workers, patients, hospitals, or clinical workflows
            NO jokes about doctors, nurses, medical staff, patients, or clinical scenarios

          **Approved Humor Themes:**

          1. **The "Sentient Server"** - Treat software like a pet or robot being trained:
             - "We fed the server more RAM and it purred contentedly"
             - "The garbage collector has been instructed to be more aggressive"
             - "We asked the API to stop timing out, and it listened"

          2. **The "Caffeinated Developer"** - Focus on developer effort and dedication:
             - "Powered by 4,000 lines of code and 3 gallons of coffee"
             - "We refactored this module. It hurt us more than it hurts you"
             - "This feature required 7 Stack Overflow tabs and a lot of patience"

          3. **The ".NET Ecosystem"** - Poke fun at tools, frameworks, and technology:
             - "Updated to .NET 9 because we like living on the bleeding edge"
             - "Entity Framework thought about generating that query, then gave up"
             - "The compiler warned us. We didn't listen. We learned."

          4. **The "Standards Enthusiast"** - Be OVERLY enthusiastic about FHIR and healthcare interoperability:
             - Channel the energy of someone who genuinely gets excited reading 5,000-page specifications
             - Think: Transit App's enthusiasm for public transportation, but for healthcare standards
             - Examples:
               - "Does anyone actually read the FHIR spec footnotes? If you do, you're our kind of person! We spent 47 hours on section 4.3.2 and it was GLORIOUS."
               - "We implemented _include and _revinclude. YES, BOTH. We're THAT excited about graph traversal in healthcare data."
               - "Finally got our Bundle pagination compliant with section 2.1.0.6.2! The nested numbering system is *chef's kiss*"
               - "HL7 published a new implementation guide and honestly? Best day of our week."
               - "We now support all 23 search parameter prefixes. TWENTY-THREE. Each one more beautiful than the last."
             - This theme works especially well for:
               - New FHIR features or compliance improvements
               - Search parameter additions
               - Spec compliance fixes
               - Anything involving StructureDefinitions or CapabilityStatements

          **When to use humor:**
          - In feature descriptions (1-2 per release, don't overdo it)
          - In bug fix descriptions (self-deprecating about our own mistakes)
          - In the bot contributors section (already creative, keep it that way)
          - In FHIR compliance features (go full "Standards Enthusiast" mode)

          **When NOT to use humor:**
          - Security fixes (always serious)
          - Breaking changes (clear and direct)
          - Critical bug fixes affecting data integrity

          CONTRIBUTORS SECTION:
          Create a main heading "## Contributors". Underneath it, create exactly two sub-sections:

          1. **### 🏆 The Humans**
             - List all unique human authors (from commits and PRs).
             - Use GitHub @mentions format (e.g., @username) so they get credited and linked.

          2. **### [Insert Creative Title Here]** (For Bots)
             - Identify bot authors (e.g., dependabot, renovate, actions-user, vercel, claude).
             - **THEME**: Pick a random theme for this specific release (e.g., Sci-Fi, Noir, Fantasy, Corporate Satire, Western, Cyberpunk).
             - **TITLE**: Invent a funny sub-heading title that REFLECTS the theme (e.g., "🤖 Digital Scribes of the Ancient Code"). Do NOT label the theme with parentheses like "(Fantasy Theme)" - the theme should be IMPLIED by the creative title, not explicitly stated.
             - **DESCRIPTIONS**: Write a 1-sentence description for each bot fitting that theme.
             - *If no bots are found in the log, omit this sub-section entirely.*

          === COMMITS ===
          $COMMITS

          === PULL REQUESTS ===
          $PR_DETAILS

          === RECENTLY CLOSED ISSUES ===
          $CLOSED_ISSUES
          EOM

          # Call Gemini API
          jq -n --arg prompt "$SYSTEM_PROMPT" '{ contents: [{ parts: [{ text: $prompt }] }] }' > payload.json

          curl -s -X POST \
            -H "Content-Type: application/json" \
            -H "x-goog-api-key: $GEMINI_API_KEY" \
            -d @payload.json \
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent" > response.json

          # Extract and validate response
          GENERATED_NOTES=$(jq -r '.candidates[0].content.parts[0].text' response.json)

          if [ "$GENERATED_NOTES" == "null" ] || [ -z "$GENERATED_NOTES" ]; then
            echo "⚠️ Warning: Gemini API returned null or failed. Using fallback release notes."
            cat response.json
            echo "## Release ${RELEASE_VERSION}" > release_notes.md
            echo "" >> release_notes.md
            echo "See commits for details." >> release_notes.md
          else
            echo "$GENERATED_NOTES" > release_notes.md
            echo "✅ Release notes generated successfully"
          fi

      - name: Display Release Notes (test mode)
        if: needs.create-git-tag.result == 'skipped'
        run: |
          echo "📝 Generated release notes (TEST MODE - not creating actual release):"
          echo "=============================================="
          cat release_notes.md
          echo "=============================================="

      - name: Create GitHub Release
        if: needs.create-git-tag.result == 'success'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: release/${{ needs.prepare-release.outputs.release_version }}
          name: Release ${{ needs.prepare-release.outputs.release_version }}
          body_path: release_notes.md
          files: |
            ./core-packages/*.nupkg
            ./internal-packages/*.nupkg
          draft: false
          prerelease: false

  # =============================================================================
  # Stage 5: Summary (always runs)
  # =============================================================================
  release-summary:
    name: 📋 Release Summary
    runs-on: ubuntu-latest
    needs: [prepare-release, publish-docker, publish-nuget-core, publish-nuget-internal, create-git-tag, create-github-release]
    if: always()

    steps:
      - name: Generate Summary
        env:
          RELEASE_VERSION: ${{ needs.prepare-release.outputs.release_version }}
          DOCKER_RESULT: ${{ needs.publish-docker.result }}
          NUGET_CORE_RESULT: ${{ needs.publish-nuget-core.result }}
          NUGET_INTERNAL_RESULT: ${{ needs.publish-nuget-internal.result }}
          TAG_RESULT: ${{ needs.create-git-tag.result }}
          RELEASE_RESULT: ${{ needs.create-github-release.result }}
        run: |
          echo "## 📋 Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: ${RELEASE_VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Stage Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Function to convert result to emoji
          result_emoji() {
            case "$1" in
              success) echo "✅" ;;
              failure) echo "❌" ;;
              skipped) echo "⏭️" ;;
              *) echo "❓" ;;
            esac
          }

          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Publish | $(result_emoji $DOCKER_RESULT) $DOCKER_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| NuGet Core (NuGet.org) | $(result_emoji $NUGET_CORE_RESULT) $NUGET_CORE_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| NuGet Internal (GitHub Packages) | $(result_emoji $NUGET_INTERNAL_RESULT) $NUGET_INTERNAL_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| Git Tag | $(result_emoji $TAG_RESULT) $TAG_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "| GitHub Release | $(result_emoji $RELEASE_RESULT) $RELEASE_RESULT |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$DOCKER_RESULT" == "success" ] && [ "$NUGET_CORE_RESULT" == "success" ] && [ "$NUGET_INTERNAL_RESULT" == "success" ] && [ "$TAG_RESULT" == "success" ] && [ "$RELEASE_RESULT" == "success" ]; then
            echo "### 🎉 All stages completed successfully!" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Docker**: \`ghcr.io/${{ github.repository }}:release\` and \`ghcr.io/${{ github.repository }}:${RELEASE_VERSION}\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**NuGet Core Packages**: Published to [NuGet.org](https://www.nuget.org/profiles/${{ github.repository_owner }})" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**NuGet Internal Packages**: Published to [GitHub Packages](https://github.com/${{ github.repository }}/packages)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Git Tag**: \`release/${RELEASE_VERSION}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ⚠️ Some stages failed - you can re-run individual jobs" >> $GITHUB_STEP_SUMMARY
          fi

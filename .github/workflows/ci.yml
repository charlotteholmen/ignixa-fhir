name: CI

on:
  push:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  SQL_SA_PASSWORD: ${{ secrets.SQL_SA_PASSWORD || 'YourStrong!Passw0rd' }}

jobs:
  build-and-unit-tests:
    name: Build and Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet-version: [ '9.0.x' ]
      fail-fast: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for GitVersion
          submodules: recursive

      - name: Build and run unit tests (exclude E2E)
        id: build
        uses: ./.github/actions/dotnet-build-and-test
        with:
          dotnet-version: ${{ matrix.dotnet-version }}
          solution-file: 'All.sln'
          build-configuration: 'Release'
          test-filter: 'FullyQualifiedName!~E2ETests'

      - name: Store version for later jobs
        run: |
          echo "VERSION=${{ steps.build.outputs.version }}" >> $GITHUB_ENV
          echo "ASSEMBLY_VERSION=${{ steps.build.outputs.assembly-version }}" >> $GITHUB_ENV

  e2e-tests-sql:
    name: E2E Tests (SQL Server)
    runs-on: ubuntu-latest
    # Run in parallel with unit tests for faster CI (both do their own build)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Start SQL Server container
        run: |
          echo "Starting SQL Server and Azurite containers..."
          docker compose -f docker-compose.test.yml up -d --wait || {
            echo "❌ Container startup failed. Checking logs..."
            docker compose -f docker-compose.test.yml logs
            docker ps -a
            exit 1
          }
          echo "✅ SQL Server and Azurite started and healthy"
        env:
          SQL_SA_PASSWORD: ${{ env.SQL_SA_PASSWORD }}

      - name: Verify SQL Server connection
        run: |
          docker exec ignixa-test-sql /opt/mssql-tools18/bin/sqlcmd \
            -S localhost -C -U sa -P "${{ env.SQL_SA_PASSWORD }}" \
            -Q "SELECT @@VERSION" -b
        timeout-minutes: 2

      - name: Restore E2E test project
        run: dotnet restore test/Ignixa.Api.E2ETests/Ignixa.Api.E2ETests.csproj

      - name: Build E2E test project
        run: dotnet build test/Ignixa.Api.E2ETests/Ignixa.Api.E2ETests.csproj --configuration Release --no-restore

      - name: Run E2E tests
        run: |
          dotnet test test/Ignixa.Api.E2ETests/Ignixa.Api.E2ETests.csproj \
            --configuration Release \
            --no-build \
            --logger "trx;LogFileName=e2e-test-results.trx" \
            --verbosity normal
        env:
          TEST_SQL_CONNECTION_STRING: "Server=localhost,1433;Database=FhirTest;User Id=sa;Password=${{ env.SQL_SA_PASSWORD }};TrustServerCertificate=true;Encrypt=false"

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: '**/e2e-test-results.trx'
          retention-days: 30

      - name: Publish E2E test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: '**/e2e-test-results.trx'
          check_name: 'E2E Test Results'
          comment_mode: 'off'

      - name: Capture SQL Server logs on failure
        if: failure()
        run: |
          echo "=== SQL Server Logs ==="
          docker logs ignixa-test-sql
          echo "=== SQL Server Error Logs ==="
          docker exec ignixa-test-sql cat /var/opt/mssql/log/errorlog || true

      - name: Cleanup SQL Server container
        if: always()
        run: |
          docker compose -f docker-compose.test.yml down -v
          echo "✅ SQL Server container stopped and removed"

  check-code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: [ build-and-unit-tests ]
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore All.sln

      - name: Run static analysis
        run: dotnet build All.sln --configuration Release --no-restore --verbosity minimal /p:TreatWarningsAsErrors=true
        continue-on-error: true

      - name: Check for code style violations
        run: |
          dotnet format All.sln --verify-no-changes --verbosity diagnostic || \
          (echo "⚠️ Code formatting issues detected. Run 'dotnet format' locally." && exit 0)
        continue-on-error: true

  build-and-push-container:
    name: Build and Push Container
    runs-on: ubuntu-latest
    needs: [ build-and-unit-tests, e2e-tests-sql ]
    if: success()
    permissions:
      contents: read
      id-token: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for GitVersion
          submodules: recursive

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: '6.x'

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v3
        with:
          useConfigFile: true

      - name: Display version
        run: echo "Building version ${{ steps.gitversion.outputs.semVer }}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          # NOTE: Version tags (0.0.68, release) are created by publish-release.yml
          # CI only creates branch/sha/latest tags to avoid duplicate version tags
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.gitversion.outputs.semVer }}
            ASSEMBLY_VERSION=${{ steps.gitversion.outputs.assemblySemVer }}
            INFORMATIONAL_VERSION=${{ steps.gitversion.outputs.informationalVersion }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}

  pack-nuget-packages:
    name: Pack NuGet Packages
    runs-on: ubuntu-latest
    needs: [ build-and-unit-tests, e2e-tests-sql ]
    if: success()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for GitVersion
          submodules: recursive

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: '6.x'

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v3
        with:
          useConfigFile: true

      - name: Display version
        run: |
          echo "NuGetVersion: ${{ steps.gitversion.outputs.nuGetVersion }}"
          echo "SemVer: ${{ steps.gitversion.outputs.semVer }}"
          echo "AssemblySemVer: ${{ steps.gitversion.outputs.assemblySemVer }}"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore All.sln

      - name: Build solution
        run: dotnet build All.sln --configuration Release --no-restore /p:Version=${{ steps.gitversion.outputs.nuGetVersion }}

      - name: Pack Core projects
        run: |
          dotnet pack src/Core/Ignixa.Abstractions/Ignixa.Abstractions.csproj --configuration Release --no-build --output ./packages -p:PackageVersion=${{ steps.gitversion.outputs.nuGetVersion }}
          dotnet pack src/Core/Ignixa.FhirFakes/Ignixa.FhirFakes.csproj --configuration Release --no-build --output ./packages -p:PackageVersion=${{ steps.gitversion.outputs.nuGetVersion }}
          dotnet pack src/Core/Ignixa.FhirPath/Ignixa.FhirPath.csproj --configuration Release --no-build --output ./packages -p:PackageVersion=${{ steps.gitversion.outputs.nuGetVersion }}
          dotnet pack src/Core/Ignixa.FhirMappingLanguage/Ignixa.FhirMappingLanguage.csproj --configuration Release --no-build --output ./packages -p:PackageVersion=${{ steps.gitversion.outputs.nuGetVersion }}
          dotnet pack src/Core/Ignixa.PackageManagement/Ignixa.PackageManagement.csproj --configuration Release --no-build --output ./packages -p:PackageVersion=${{ steps.gitversion.outputs.nuGetVersion }}
          dotnet pack src/Core/Ignixa.Search/Ignixa.Search.csproj --configuration Release --no-build --output ./packages -p:PackageVersion=${{ steps.gitversion.outputs.nuGetVersion }}
          dotnet pack src/Core/Ignixa.Serialization/Ignixa.Serialization.csproj --configuration Release --no-build --output ./packages -p:PackageVersion=${{ steps.gitversion.outputs.nuGetVersion }}
          dotnet pack src/Core/Ignixa.Specification/Ignixa.Specification.csproj --configuration Release --no-build --output ./packages -p:PackageVersion=${{ steps.gitversion.outputs.nuGetVersion }}
          dotnet pack src/Core/Ignixa.SqlOnFhir/Ignixa.SqlOnFhir.csproj --configuration Release --no-build --output ./packages -p:PackageVersion=${{ steps.gitversion.outputs.nuGetVersion }}
          dotnet pack src/Core/Ignixa.SqlOnFhir.Writers/Ignixa.SqlOnFhir.Writers.csproj --configuration Release --no-build --output ./packages -p:PackageVersion=${{ steps.gitversion.outputs.nuGetVersion }}
          dotnet pack src/Core/Ignixa.Validation/Ignixa.Validation.csproj --configuration Release --no-build --output ./packages -p:PackageVersion=${{ steps.gitversion.outputs.nuGetVersion }}
          dotnet pack src/Core/Extensions/Ignixa.Extensions.FirelySdk5/Ignixa.Extensions.FirelySdk5.csproj --configuration Release --no-build --output ./packages -p:PackageVersion=${{ steps.gitversion.outputs.nuGetVersion }}
          dotnet pack src/Core/Extensions/Ignixa.Extensions.FirelySdk6/Ignixa.Extensions.FirelySdk6.csproj --configuration Release --no-build --output ./packages -p:PackageVersion=${{ steps.gitversion.outputs.nuGetVersion }}
          dotnet pack tools/Ignixa.FhirFakes.Cli/Ignixa.FhirFakes.Cli.csproj --configuration Release --no-build --output ./packages -p:PackageVersion=${{ steps.gitversion.outputs.nuGetVersion }}
          dotnet pack tools/Ignixa.Validation.Cli/Ignixa.Validation.Cli.csproj --configuration Release --no-build --output ./packages -p:PackageVersion=${{ steps.gitversion.outputs.nuGetVersion }}
          dotnet pack tools/Ignixa.SqlOnFhir.Cli/Ignixa.SqlOnFhir.Cli.csproj --configuration Release --no-build --output ./packages -p:PackageVersion=${{ steps.gitversion.outputs.nuGetVersion }}

      - name: List packages
        run: ls -lh ./packages/

      - name: Save version and commit SHA for release
        run: |
          echo "${{ steps.gitversion.outputs.semVer }}" > ./packages/version.txt
          echo "${{ github.sha }}" > ./packages/commit-sha.txt
          echo "Version: $(cat ./packages/version.txt)"
          echo "Commit SHA: $(cat ./packages/commit-sha.txt)"

      - name: Upload packages as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: |
            ./packages/*.nupkg
            ./packages/version.txt
            ./packages/commit-sha.txt
          retention-days: 30

      - name: Package summary
        run: |
          echo "## 📦 NuGet Packages Ready for Release" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The following packages are ready to be published:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for pkg in ./packages/*.nupkg; do
            basename "$pkg" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Use the **Publish Release** workflow to publish and create a GitHub release." >> $GITHUB_STEP_SUMMARY

  notify-success:
    name: Notify Success
    runs-on: ubuntu-latest
    needs: [ build-and-unit-tests, e2e-tests-sql, build-and-push-container, pack-nuget-packages ]
    if: |
      always() &&
      needs.build-and-unit-tests.result == 'success' &&
      needs.e2e-tests-sql.result == 'success' &&
      needs.build-and-push-container.result == 'success' &&
      needs.pack-nuget-packages.result == 'success'

    steps:
      - name: Create success status
        run: |
          echo "✅ CI pipeline completed successfully"
          echo "Unit tests: ✅"
          echo "E2E tests: ✅"
          echo "Docker build: ✅"
          echo "NuGet packing: ✅"

  notify-failure:
    name: Notify Failure
    runs-on: ubuntu-latest
    needs: [ build-and-unit-tests, e2e-tests-sql, build-and-push-container, pack-nuget-packages ]
    if: failure()

    steps:
      - name: Create failure status
        run: |
          echo "❌ CI pipeline failed"
          echo "Unit tests: ${{ needs.build-and-unit-tests.result }}"
          echo "E2E tests: ${{ needs.e2e-tests-sql.result }}"
          echo "Docker build: ${{ needs.build-and-push-container.result }}"
          echo "NuGet packing: ${{ needs.pack-nuget-packages.result }}"
          exit 1

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FHIR Test Results Viewer</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 20px;
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    .header { text-align: center; color: white; margin-bottom: 40px; }
    .header h1 { margin: 0; font-size: 2.5em; }
    .card {
      background: white;
      border-radius: 12px;
      padding: 30px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 20px;
      margin: 20px 0;
    }
    .metric {
      background: #f5f5f5;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
      border-left: 4px solid #667eea;
    }
    .metric-value { font-size: 2.5em; font-weight: bold; color: #333; }
    .metric-label { color: #666; font-size: 0.9em; margin-top: 5px; text-transform: uppercase; }
    .drop-zone {
      border: 2px dashed #667eea;
      border-radius: 8px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      background: #f9f9f9;
    }
    .drop-zone:hover { background: #f0f0f0; }
    .btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      margin: 10px 5px;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4); }
    .file-input { display: none; }
    .error { color: #d32f2f; padding: 15px; background: #ffebee; border-radius: 8px; margin-bottom: 20px; }
    .loading { text-align: center; padding: 40px; color: #666; }
    .info { color: #333; margin: 10px 0; }
    .charts-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; margin: 20px 0; }
    .chart-card { background: white; border-radius: 8px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .chart-title { font-size: 1.1em; font-weight: 600; margin-bottom: 15px; color: #333; }
    .status-chart-wrapper { position: relative; height: 300px; max-width: 300px; margin: 0 auto; }
    .category-chart-wrapper { position: relative; height: 300px; }
    .filters { display: flex; gap: 10px; margin: 20px 0; flex-wrap: wrap; }
    .filter-btn { padding: 8px 16px; border: 2px solid #ddd; background: white; border-radius: 6px; cursor: pointer; font-weight: 500; transition: all 0.2s; }
    .filter-btn.active { background: #667eea; color: white; border-color: #667eea; }
    .table-wrapper { overflow-x: auto; max-width: 100%; }
    .results-table { width: 100%; max-width: 1200px; border-collapse: collapse; margin: 20px 0; }
    .results-table th { background: #f5f5f5; padding: 12px; text-align: left; font-weight: 600; border-bottom: 2px solid #ddd; cursor: pointer; user-select: none; }
    .results-table th:hover { background: #efefef; }
    .results-table th.sortable::after { content: ' ⇅'; font-size: 0.8em; color: #999; }
    .results-table th.sort-asc::after { content: ' ↑'; color: #667eea; }
    .results-table th.sort-desc::after { content: ' ↓'; color: #667eea; }
    .results-table td { padding: 12px; border-bottom: 1px solid #eee; }
    .results-table tr:hover { background: #fafafa; }
    .test-row { cursor: pointer; }
    .status-badge { display: inline-block; padding: 4px 10px; border-radius: 4px; font-size: 0.85em; font-weight: 600; }
    .status-passed { background: #c8e6c9; color: #2e7d32; }
    .status-failed { background: #ffcdd2; color: #c62828; }
    .status-skipped { background: #ffe0b2; color: #e65100; }
    .test-details { background: #f9f9f9; padding: 15px; margin: 10px 0; border-radius: 6px; border-left: 4px solid #667eea; }
    .detail-label { font-weight: 600; color: #333; margin-top: 10px; margin-bottom: 5px; font-size: 0.9em; }
    .detail-content { background: white; padding: 10px; border-radius: 4px; font-family: monospace; font-size: 0.85em; color: #666; word-break: break-word; white-space: pre-wrap; max-height: 200px; overflow-y: auto; }
    .results-count { color: #666; margin-bottom: 15px; font-size: 0.95em; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function StatusChart({ report }) {
      const canvasRef = useRef(null);
      const chartRef = useRef(null);

      useEffect(() => {
        if (!canvasRef.current || !report) return;

        if (chartRef.current) {
          chartRef.current.destroy();
        }

        const ctx = canvasRef.current.getContext('2d');
        chartRef.current = new window.Chart(ctx, {
          type: 'doughnut',
          data: {
            labels: ['Passed', 'Failed', 'Skipped'],
            datasets: [{
              data: [report.Passed, report.Failed, report.Skipped],
              backgroundColor: ['#4caf50', '#f44336', '#ff9800'],
              borderColor: ['#fff', '#fff', '#fff'],
              borderWidth: 2
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {
                position: 'bottom',
                labels: { padding: 15, font: { size: 12 } }
              }
            }
          }
        });

        return () => {
          if (chartRef.current) chartRef.current.destroy();
        };
      }, [report]);

      return (
        <div className="chart-card">
          <div className="chart-title">Test Status Distribution</div>
          <div className="status-chart-wrapper">
            <canvas ref={canvasRef}></canvas>
          </div>
        </div>
      );
    }

    function CategoryChart({ report }) {
      const canvasRef = useRef(null);
      const chartRef = useRef(null);

      useEffect(() => {
        if (!canvasRef.current || !report || !report.Results) return;

        const categoryMap = {};
        report.Results.forEach(result => {
          const cat = result.Category || 'Unknown';
          if (!categoryMap[cat]) {
            categoryMap[cat] = { passed: 0, failed: 0, skipped: 0 };
          }
          if (result.Status === 'Passed') categoryMap[cat].passed++;
          else if (result.Status === 'Failed') categoryMap[cat].failed++;
          else if (result.Status === 'Skipped') categoryMap[cat].skipped++;
        });

        const categories = Object.keys(categoryMap).sort();
        const passed = categories.map(c => categoryMap[c].passed);
        const failed = categories.map(c => categoryMap[c].failed);
        const skipped = categories.map(c => categoryMap[c].skipped);

        if (chartRef.current) {
          chartRef.current.destroy();
        }

        const ctx = canvasRef.current.getContext('2d');
        chartRef.current = new window.Chart(ctx, {
          type: 'bar',
          data: {
            labels: categories,
            datasets: [
              {
                label: 'Passed',
                data: passed,
                backgroundColor: '#4caf50'
              },
              {
                label: 'Failed',
                data: failed,
                backgroundColor: '#f44336'
              },
              {
                label: 'Skipped',
                data: skipped,
                backgroundColor: '#ff9800'
              }
            ]
          },
          options: {
            indexAxis: 'y',
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {
                position: 'bottom',
                labels: { padding: 15, font: { size: 12 } }
              }
            },
            scales: {
              x: { stacked: true },
              y: { stacked: true }
            }
          }
        });

        return () => {
          if (chartRef.current) chartRef.current.destroy();
        };
      }, [report]);

      return (
        <div className="chart-card">
          <div className="chart-title">Results by Category</div>
          <div className="category-chart-wrapper">
            <canvas ref={canvasRef}></canvas>
          </div>
        </div>
      );
    }

    function TestResultsTable({ report, filterStatus }) {
      const [expandedRows, setExpandedRows] = useState({});
      const [sortField, setSortField] = useState('TestName');
      const [sortAsc, setSortAsc] = useState(true);

      const toggleRow = (index) => {
        setExpandedRows(prev => ({
          ...prev,
          [index]: !prev[index]
        }));
      };

      const handleSort = (field) => {
        if (sortField === field) {
          setSortAsc(!sortAsc);
        } else {
          setSortField(field);
          setSortAsc(true);
        }
      };

      const filteredResults = report.Results.filter(result => {
        if (filterStatus === 'All') return true;
        return result.Status === filterStatus;
      });

      const sortedResults = [...filteredResults].sort((a, b) => {
        let aVal = a[sortField];
        let bVal = b[sortField];

        if (sortField === 'Duration') {
          aVal = Number(aVal) || 0;
          bVal = Number(bVal) || 0;
        } else if (aVal && bVal) {
          aVal = String(aVal).toLowerCase();
          bVal = String(bVal).toLowerCase();
        }

        if (aVal < bVal) return sortAsc ? -1 : 1;
        if (aVal > bVal) return sortAsc ? 1 : -1;
        return 0;
      });

      const getStatusColor = (status) => {
        switch(status) {
          case 'Passed': return 'status-passed';
          case 'Failed': return 'status-failed';
          case 'Skipped': return 'status-skipped';
          default: return '';
        }
      };

      return (
        <div style={{ marginTop: '30px' }}>
          <h3 style={{ marginBottom: '10px' }}>Test Results</h3>
          <div className="results-count">
            Showing {filteredResults.length} of {report.Results.length} tests
          </div>
          <div className="table-wrapper">
            <table className="results-table">
              <thead>
                <tr>
                  <th
                    className={`sortable ${sortField === 'TestName' ? (sortAsc ? 'sort-asc' : 'sort-desc') : ''}`}
                    onClick={() => handleSort('TestName')}
                    style={{ width: '40%' }}
                  >
                    Test Name
                  </th>
                  <th
                    className={`sortable ${sortField === 'Category' ? (sortAsc ? 'sort-asc' : 'sort-desc') : ''}`}
                    onClick={() => handleSort('Category')}
                    style={{ width: '15%' }}
                  >
                    Category
                  </th>
                  <th
                    className={`sortable ${sortField === 'Status' ? (sortAsc ? 'sort-asc' : 'sort-desc') : ''}`}
                    onClick={() => handleSort('Status')}
                    style={{ width: '15%' }}
                  >
                    Status
                  </th>
                  <th
                    className={`sortable ${sortField === 'Duration' ? (sortAsc ? 'sort-asc' : 'sort-desc') : ''}`}
                    onClick={() => handleSort('Duration')}
                    style={{ width: '15%', textAlign: 'right' }}
                  >
                    Duration (ms)
                  </th>
                  <th style={{ width: '15%' }}>Actions</th>
                </tr>
              </thead>
              <tbody>
                {sortedResults.map((result, index) => (
                  <React.Fragment key={index}>
                    <tr className="test-row" onClick={() => toggleRow(index)}>
                      <td style={{ fontSize: '0.9em' }} title={result.TestName.split('.').pop()}>
                        {(() => {
                          const testName = result.TestName.split('.').pop();
                          return testName.length > 255 ? testName.substring(0, 255) + '...' : testName;
                        })()}
                      </td>
                      <td>{result.Category}</td>
                      <td>
                        <span className={`status-badge ${getStatusColor(result.Status)}`}>
                          {result.Status}
                        </span>
                      </td>
                      <td style={{ textAlign: 'right' }}>
                        {result.Duration ? result.Duration.toFixed(2) : 'N/A'}
                      </td>
                      <td>
                        <button
                          className="btn"
                          style={{ fontSize: '0.85em', padding: '6px 12px', margin: 0 }}
                          onClick={(e) => {
                            e.stopPropagation();
                            toggleRow(index);
                          }}
                        >
                          {expandedRows[index] ? 'Hide' : 'Show'}
                        </button>
                      </td>
                    </tr>
                    {expandedRows[index] && (
                      <tr>
                        <td colSpan="5">
                          <div className="test-details">
                            {result.Trait && (
                              <>
                                <div className="detail-label">Trait:</div>
                                <div className="detail-content">{result.Trait}</div>
                              </>
                            )}
                            {result.ErrorMessage && (
                              <>
                                <div className="detail-label">Error Message:</div>
                                <div className="detail-content">{result.ErrorMessage}</div>
                              </>
                            )}
                            {result.StackTrace && (
                              <>
                                <div className="detail-label">Stack Trace:</div>
                                <div className="detail-content">{result.StackTrace}</div>
                              </>
                            )}
                            {result.Output && (
                              <>
                                <div className="detail-label">Output:</div>
                                <div className="detail-content">{result.Output}</div>
                              </>
                            )}
                            {!result.ErrorMessage && !result.StackTrace && !result.Output && (
                              <div style={{ color: '#999', fontStyle: 'italic' }}>No additional details</div>
                            )}
                          </div>
                        </td>
                      </tr>
                    )}
                  </React.Fragment>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      );
    }

    function App() {
      const [report, setReport] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [filterStatus, setFilterStatus] = useState('All');
      const fileInputRef = useRef(null);

      useEffect(() => {
        console.log('[App] Component mounted, fetching /api/report...');
        fetch('/api/report')
          .then(r => {
            console.log('[App] Response status:', r.status);
            if (!r.ok) {
              console.log('[App] Not ok, throwing error');
              throw new Error('Not found');
            }
            return r.json();
          })
          .then(data => {
            console.log('[App] Data loaded successfully:', data);
            setReport(data);
          })
          .catch(err => {
            console.log('[App] Fetch error:', err.message);
          })
          .finally(() => {
            setLoading(false);
          });
      }, []);

      const handleFileSelect = (file) => {
        if (!file) return;
        console.log('[App] File selected:', file.name);
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const data = JSON.parse(e.target.result);
            console.log('[App] File parsed successfully');
            setReport(data);
            setError(null);
          } catch (err) {
            setError('Failed to parse JSON: ' + err.message);
          }
        };
        reader.onerror = () => {
          setError('Failed to read file');
        };
        reader.readAsText(file);
      };

      const handleDrop = (e) => {
        e.preventDefault();
        const files = e.dataTransfer.files;
        if (files.length > 0) {
          console.log('[App] File dropped');
          handleFileSelect(files[0]);
        }
      };

      if (loading) {
        return (
          <div className="container">
            <div className="header"><h1>Test Results Viewer</h1></div>
            <div className="card">
              <div className="loading">Loading report...</div>
            </div>
          </div>
        );
      }

      if (report) {
        return (
          <div className="container">
            <div className="header"><h1>Test Results Viewer</h1></div>
            <div className="card">
              <button className="btn" onClick={() => window.location.reload()}>Load Another Report</button>
              <h2>Server: {report.ServerUrl || 'N/A'}</h2>
              <div className="info">Date: {new Date(report.TestRunDate).toLocaleString()}</div>
              <div className="metrics">
                <div className="metric">
                  <div className="metric-value">{report.TotalTests}</div>
                  <div className="metric-label">Total Tests</div>
                </div>
                <div className="metric">
                  <div className="metric-value" style={{color: '#4caf50'}}>{report.Passed}</div>
                  <div className="metric-label">Passed</div>
                </div>
                <div className="metric">
                  <div className="metric-value" style={{color: '#f44336'}}>{report.Failed}</div>
                  <div className="metric-label">Failed</div>
                </div>
                <div className="metric">
                  <div className="metric-value" style={{color: '#ff9800'}}>{report.Skipped}</div>
                  <div className="metric-label">Skipped</div>
                </div>
                <div className="metric">
                  <div className="metric-value">{(report.PassRate * 100).toFixed(1)}%</div>
                  <div className="metric-label">Pass Rate</div>
                </div>
              </div>
              <div className="charts-container">
                <StatusChart report={report} />
                {report.Results && <CategoryChart report={report} />}
              </div>
              <div style={{ marginTop: '40px' }}>
                <h3 style={{ marginBottom: '15px' }}>Filter Results</h3>
                <div className="filters">
                  {['All', 'Passed', 'Failed', 'Skipped'].map(status => (
                    <button key={status} className={`filter-btn ${filterStatus === status ? 'active' : ''}`} onClick={() => setFilterStatus(status)} >
                      {status}
                    </button>
                  ))}
                </div>
              </div>
              {report.Results && <TestResultsTable report={report} filterStatus={filterStatus} />}
            </div>
          </div>
        );
      }

      return (
        <div className="container">
          <div className="header"><h1>Test Results Viewer</h1></div>
          <div className="card">
            {error && <div className="error">{error}</div>}
            <div className="drop-zone" onDrop={handleDrop} onDragOver={(e) => e.preventDefault()} onClick={() => fileInputRef.current?.click()} >
              <h2>Drop Test Report Here</h2>
              <p>or click to browse</p>
              <p style={{color: '#999', fontSize: '0.9em'}}>Waiting for report...</p>
            </div>
            <input ref={fileInputRef} type="file" className="file-input" accept=".json" onChange={(e) => handleFileSelect(e.target.files?.[0])} />
            <div style={{ textAlign: 'center', marginTop: '20px' }}>
              <button className="btn" onClick={() => fileInputRef.current?.click()}>
                Select File
              </button>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

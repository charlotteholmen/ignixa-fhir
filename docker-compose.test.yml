name: ignixa-e2e-tests

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-CU16-ubuntu-22.04
    container_name: ignixa-test-sql
    environment:
      ACCEPT_EULA: Y
      SA_PASSWORD: ${SQL_SA_PASSWORD:-YourStrong!Passw0rd}
      MSSQL_PID: Developer
      MSSQL_COLLATION: Latin1_General_100_CI_AS_SC_UTF8
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -C -U sa -P "$${SA_PASSWORD}" -Q "SELECT 1" -b -o /dev/null
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 10s
    networks:
      - e2e-net

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: ignixa-test-azurite
    command: azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0 --loose
    ports:
      - "10000:10000"  # Blob service
      - "10001:10001"  # Queue service
      - "10002:10002"  # Table service
    volumes:
      - azurite-data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:10000', (res) => process.exit(res.statusCode === 400 ? 0 : 1))"]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 10s
    networks:
      - e2e-net

volumes:
  sqlserver-data:
  azurite-data:

networks:
  e2e-net:
    driver: bridge
